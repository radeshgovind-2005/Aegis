name: Deploy Staging

on:
  push:
    branches: [main]

# Only one staging deploy at a time.
concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Guard: if secrets aren't configured yet (pre-Phase 8), skip cleanly
    # instead of failing. We detect this by checking for the account ID.
    if: ${{ github.repository_owner != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Check for Cloudflare credentials
        id: creds
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Cloudflare secrets not configured yet — skipping deploy (expected pre-Phase 8)."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.creds.outputs.configured == 'true'
        run: npm ci

      - name: Verify before deploy
        if: steps.creds.outputs.configured == 'true'
        run: npm run verify

      - name: Deploy
        if: steps.creds.outputs.configured == 'true'
        run: npx wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Record deploy
        if: steps.creds.outputs.configured == 'true'
        run: |
          echo "Deployed ${{ github.sha }} to staging at $(date -u +%FT%TZ)"
