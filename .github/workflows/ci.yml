name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('coverage/**') != ''
        with:
          name: coverage-${{ github.sha }}
          path: coverage/
          retention-days: 14

      - name: Coverage threshold check
        run: |
          # Fail if domain coverage drops below 95% or adapters below 80%.
          # Phase 2+ turns this on. For Phase 0 it's a no-op.
          if [ -f coverage/coverage-summary.json ]; then
            node scripts/check-coverage.mjs || exit 1
          else
            echo "No coverage report yet (expected pre-Phase 2)."
          fi

  wrangler-validate:
    name: Wrangler config sanity
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate wrangler.jsonc
        run: npx wrangler deploy --dry-run --outdir=/tmp/wrangler-dryrun
        env:
          # Dry-run doesn't need real creds; wrangler will complain
          # if the config is malformed.
          CLOUDFLARE_API_TOKEN: dry-run-placeholder
          CLOUDFLARE_ACCOUNT_ID: dry-run-placeholder
